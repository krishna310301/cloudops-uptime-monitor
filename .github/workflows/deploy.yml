name: Deploy CloudOps Uptime Monitor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_to_aws:
        description: "Deploy Lambda functions and frontend to AWS"
        required: true
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-east-1

permissions:
  contents: read
  id-token: write

jobs:
  lambda-tests:
    name: Test Lambda handlers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run Lambda unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m unittest discover -s tests -v

  python-security:
    name: Scan Lambda code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: python -m pip install bandit

      - name: Run Bandit
        run: bandit -r lambda -ll

  frontend-tests:
    name: Test React dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        env:
          CI: true
        run: npm test -- --watchAll=false

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_API_BASE_URL: https://example.execute-api.us-east-1.amazonaws.com/prod
          REACT_APP_API_KEY: test-dashboard-key
        run: npm run build

  terraform-validate:
    name: Validate Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend=false \
            -get=true \
            -upgrade

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -diff

  terraform-security:
    name: Scan Terraform security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          config_file: .checkov.yaml
          soft_fail: true

  deploy-lambda:
    name: Deploy Lambda Functions
    runs-on: ubuntu-latest
    needs: [lambda-tests, python-security, frontend-tests, terraform-validate, terraform-security]
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_to_aws == true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package Lambda functions
        run: |
          cd lambda
          zip -r url_checker.zip url_checker.py url_validation.py
          zip -r api_handler.zip api_handler.py url_validation.py

      - name: Deploy URL checker Lambda
        run: |
          aws lambda update-function-code \
            --function-name cloudops-url-checker \
            --zip-file fileb://lambda/url_checker.zip

      - name: Deploy API handler Lambda
        run: |
          aws lambda update-function-code \
            --function-name cloudops-api-handler \
            --zip-file fileb://lambda/api_handler.zip

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-lambda
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_to_aws == true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
          REACT_APP_API_KEY: ${{ secrets.REACT_APP_API_KEY }}
        run: npm run build

      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/build s3://${{ secrets.FRONTEND_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
